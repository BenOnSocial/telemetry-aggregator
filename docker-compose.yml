services:
  aggregator:
    build:
      context: .
      dockerfile: cmd/aggregator/Dockerfile
    deploy:
      replicas: 3
    restart: always
    networks:
      - telemetry-network
    environment:
      - WORKER_COUNT=50
      - CACHE_ADDRESS=cache:6379
      - DATABASE_HOST=database
      - DATABASE_PORT=5432
      - POSTGRES_DB=telemetry
      - DATABASE_COPY_BATCH_SIZE=500  # data points
      - DATABASE_COPY_BATCH_TIMEOUT=30  # seconds
    secrets:
      - database_password
    depends_on:
      database:
        condition: service_started
      cache:
        condition: service_started
      flyway:
        condition: service_completed_successfully
  agent:
    build:
      context: .
      dockerfile: cmd/agent/Dockerfile
    deploy:
      replicas: 5
    environment:
      - AGGREGATOR_ADDR=nginx:80
    restart: always
    networks:
      - telemetry-network
    depends_on:
      - aggregator

  api-server:
    build:
      context: .
      dockerfile: cmd/api-server/Dockerfile
    deploy:
      replicas: 2
    restart: always
    networks:
      - telemetry-network
    environment:
      - CACHE_ADDRESS=cache:6379
    depends_on:
      - cache
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - aggregator
      - api-server
    networks:
    - telemetry-network

  cache:
    image: redis:alpine
    networks:
      - telemetry-network
    ports:
      - "6379:6379"
  database:
    image: dhi.io/postgres:18-alpine3.22
    secrets:
      - database_password
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/database_password
      - POSTGRES_DB=telemetry
    networks:
      - telemetry-network
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemetry"]
      interval: 5s
      timeout: 5s
      retries: 5
  flyway:
    image: flyway/flyway:latest
    entrypoint: ["flyway", "-connectRetries=60", "migrate"]
    volumes:
      - ./secrets:/flyway/conf
      - ./schema:/flyway/sql
    secrets:
      - database_password
    depends_on:
      - database
    networks:
      - telemetry-network
networks:
  telemetry-network:
    driver: bridge
secrets:
  database_password:
    file: ./secrets/database_password.txt
volumes:
  db_data:
